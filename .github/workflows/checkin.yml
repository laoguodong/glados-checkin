name: GLaDOS 2026 Checkin

on:
  schedule:
    # 每日北京时间 09:17（UTC 01:17）启动，避开 GitHub Actions 整点调度高峰。
    # 任务内随机等待 43–163 分钟，实际签到窗口保持在北京时间 10:00–12:00。
    - cron: '17 1 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]  # 推送时也触发，保持活跃

jobs:
  checkin:
    runs-on: ubuntu-latest
    # 覆盖最长 163 分钟随机延迟、依赖安装、签到与失败重试。
    timeout-minutes: 180

    steps:
      - name: Checkout
        # v7 原生使用 Node.js 24，消除 GitHub 对 Node.js 20 的弃用警告。
        uses: actions/checkout@v7

      - name: Setup Python
        # v6 原生使用 Node.js 24，消除 GitHub 对 Node.js 20 的弃用警告。
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Randomize check-in time
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          # 基准延迟 43 分钟 + 随机 0–120 分钟：实际签到窗口为北京时间 10:00–12:00。
          delay_seconds=$(( (43 * 60) + (RANDOM % 7201) ))
          delay_minutes=$(( delay_seconds / 60 ))
          delay_seconds=$(( delay_seconds % 60 ))
          echo "Scheduled run: delaying check-in by ${delay_minutes}m ${delay_seconds}s (range: 43–163 minutes)."
          sleep "$(( delay_minutes * 60 + delay_seconds ))"

      - name: Run Checkin
        run: python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      - name: Retry on Failure
        if: failure()
        run: |
          echo "First attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
