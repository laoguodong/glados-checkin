name: GLaDOS 2026 Checkin

on:
  schedule:
    # 每日北京时间 10:00（UTC 02:00）触发；任务内随机延迟 0–120 分钟后签到。
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]  # 推送时也触发，保持活跃

jobs:
  checkin:
    runs-on: ubuntu-latest
    # 允许最长 2 小时随机延迟，加上依赖安装与签到执行余量。
    timeout-minutes: 140

    steps:
      - name: Checkout
        # v7 原生使用 Node.js 24，消除 GitHub 对 Node.js 20 的弃用警告。
        uses: actions/checkout@v7

      - name: Setup Python
        # v6 原生使用 Node.js 24，消除 GitHub 对 Node.js 20 的弃用警告。
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Randomize check-in time
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          delay_seconds=$(( RANDOM * 60 + RANDOM % 60 ))
          delay_minutes=$(( delay_seconds / 60 ))
          delay_seconds=$(( delay_seconds % 60 ))
          echo "Scheduled run: delaying check-in by ${delay_minutes}m ${delay_seconds}s (range: 0–120 minutes)."
          sleep "$(( delay_minutes * 60 + delay_seconds ))"

      - name: Run Checkin
        run: python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      - name: Retry on Failure
        if: failure()
        run: |
          echo "First attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
